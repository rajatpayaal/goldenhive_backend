spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:goldenhive}
spring.data.mongodb.auto-index-creation=true
aws.s3.bucket=${AWS_S3_BUCKET:goldenhive-prod-assets}
aws.region=${AWS_REGION:ap-south-1}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.packages-to-scan=com.goldenhive.backend.controller
springdoc.paths-to-match=/api/**
