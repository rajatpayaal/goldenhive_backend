name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw -B clean package -DskipTests

      - name: Docker Login
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_TOKEN != '' }}
        run: echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Backend Image
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_TOKEN != '' }}
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/goldenhive-backend:latest .

      - name: Push Backend Image
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_TOKEN != '' }}
        run: docker push ${{ secrets.DOCKER_USERNAME }}/goldenhive-backend:latest

      - name: Skip Docker Publish (Secrets Missing)
        if: ${{ secrets.DOCKER_USERNAME == '' || secrets.DOCKER_TOKEN == '' }}
        run: echo "Docker publish skipped because DOCKER_USERNAME or DOCKER_TOKEN is not set in repository secrets."