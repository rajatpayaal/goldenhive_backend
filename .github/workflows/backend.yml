name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    environment: secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -B clean package -DskipTests

      - name: Check Docker Secrets
        id: docker_secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Login
        if: ${{ steps.docker_secrets.outputs.enabled == 'true' }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build Backend Image
        if: ${{ steps.docker_secrets.outputs.enabled == 'true' }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker build -t "$DOCKER_USERNAME"/goldenhive-backend:latest .

      - name: Push Backend Image
        if: ${{ steps.docker_secrets.outputs.enabled == 'true' }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker push "$DOCKER_USERNAME"/goldenhive-backend:latest

      - name: Skip Docker Publish (Secrets Missing)
        if: ${{ steps.docker_secrets.outputs.enabled != 'true' }}
        run: echo "Docker publish skipped because DOCKER_USERNAME or DOCKER_TOKEN is not available in the selected GitHub environment/repository secrets."